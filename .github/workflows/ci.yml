name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        working-directory: app
        run: python model.py

      - name: Test health endpoint
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
          SERVER_PID=$!
          for i in {1..10}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "Server is ready"
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start. Logs:"
          cat server.log
          kill $SERVER_PID 2>/dev/null || true
          exit 1

      - name: Build Docker image
        run: docker build -t burnout-predictor .

      - name: Test Docker container
        run: |
          docker run -d -p 8001:8000 --name test-container burnout-predictor
          
          # Wait for container to be ready with retry logic
          for i in {1..30}; do
            if curl -f http://localhost:8001/health 2>/dev/null; then
              echo "Container is ready"
              break
            fi
            echo "Waiting for container... (attempt $i/30)"
            sleep 1
          done
          
          curl -f http://localhost:8001/health
          docker stop test-container